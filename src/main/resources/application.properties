spring.application.name= realreview-project

# MySQL DB connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/realreview-project
spring.datasource.username=root
spring.datasource.password=Rushi@9797
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# File upload properties (optional)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Ensure datasource initialization always runs
spring.datasource.initialization-mode=always
